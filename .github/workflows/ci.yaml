---
name: CI

# One CI to rule them all,
# one CI to find them,
# One CI to bring them all
# and in the flakyness bind them.

on:  # yamllint disable-line rule:truthy
  - push
  - pull_request

env:
  DEBIAN_FRONTEND: noninteractive

  # Note: ca-certificates and git are needed for actions/checkout to use git
  # which is needed for codecov/codecov-action.
  checkout_deps: ca-certificates git
  base_deps: >
    python3 python3-apt python3-psutil python3-pytest python3-pytest-cov
  build_deps: >
    default-jdk-headless pkg-config python3-distutils-extra python3-setuptools
  common_deps: python3-distro-info python3-launchpadlib
  gtk_deps: gir1.2-gtk-3.0 gir1.2-wnck-3.0 gnome-icon-theme procps python3-gi
  kde_deps: procps pyqt6-dev-tools python3-pyqt6
  unit_deps: locales python3-systemd python3-zstandard
  integration_deps: >
    bash binutils gcc gdb kmod libc6-dev libglib2.0-dev libxml2-utils
    polkitd python3-systemd valgrind xterm
  system_deps: >
    dbus dbus-x11 gdb-multiarch gvfs-daemons psmisc python3-dbus
    ubuntu-dbgsym-keyring ubuntu-keyring xterm xvfb
  system_internet_deps: >
    chaos-marmosets dpkg-dev gdb-multiarch ubuntu-dbgsym-keyring ubuntu-keyring
    valgrind

jobs:
  linter:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    container:
      image: ubuntu:resolute
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: >
          apt-get update
          && apt-get install --no-install-recommends --yes
          black isort mypy pycodestyle pydocstyle pylint python3-typeshed
          python3-dbus python3-distutils-extra python3-rpm python3-yaml
          python3-systemd python3-zstandard
          $base_deps $common_deps $gtk_deps $kde_deps
      - name: Run linter tests
        run: tests/run-linters

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v4.0.0

  unit-and-integration:
    runs-on: ${{ matrix.architecture }}
    strategy:
      fail-fast: false
      matrix:
        container:
          - debian:stable-slim
          - debian:testing-slim
          - ubuntu:questing
          - ubuntu:resolute
        architecture:
          - ubuntu-26.04
          - ubuntu-26.04-arm
    container:
      image: ${{ matrix.container }}
      options: --cap-add=SYS_PTRACE --security-opt seccomp=unconfined
    steps:
      - name: Sanitize container name (for artifact name)
        run: |
          container=$(echo "${{ matrix.container }}" | sed 's/:/-/')
          host="${{ matrix.architecture }}"
          echo "JOB=${GITHUB_JOB}-${container}-on-${host}" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: >
          apt-get update
          && apt-get install --no-install-recommends --yes
          $base_deps $build_deps $common_deps $gtk_deps $kde_deps
          $unit_deps $integration_deps
      - uses: actions/checkout@v6
      - name: Enable German locale
        run: sed -i 's/^# de_DE/de_DE/g' /etc/locale.gen && locale-gen
      - name: Build (Java and PolicyKit XML)
        run: >
          python3 -m coverage run ./setup.py build
          && python3 -m coverage xml -o coverage-setup.xml
      - name: Run unit and integration tests
        run: >
          python3 -m pytest -v -ra --cov=$(pwd) --cov-report=xml
          --durations=0 tests/unit/ tests/integration/
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ env.JOB }}
          path: ./coverage*.xml

  unit-and-integration-installed:
    runs-on: ubuntu-26.04
    strategy:
      fail-fast: false
    steps:
      - name: Remove system installed Apport
        run: >
          sudo apt-get remove --purge --yes
          apport python3-apport python3-problem-report
      - name: Install dependencies
        run: >
          sudo apt-get update
          && sudo apt-get install --no-install-recommends --yes
          $base_deps $build_deps $common_deps $gtk_deps $kde_deps $unit_deps
          $unit_deps $integration_deps
      - uses: actions/checkout@v6
      - name: Enable German locale
        run: sudo sed -i 's/^# de_DE/de_DE/g' /etc/locale.gen && sudo locale-gen
      - name: Install
        run: >
          sudo python3 -m coverage run
          ./setup.py install --install-layout=deb --prefix=/usr --root=/
          && sudo chown "$SUDO_UID:$SUDO_GID" .coverage
          && python3 -m coverage xml -o coverage-setup.xml
      - name: Run unit and integration tests
        run: >
          WORKDIR=$(mktemp -d -t apport.XXXXXXXXXX)
          && cp -r tests pyproject.toml "$WORKDIR"
          && cd "$WORKDIR"
          && python3 -m pytest -v -ra --cov=$(pwd) --cov-report=xml
          --durations=0 tests/unit/ tests/integration/
          && cd -
          && cp "$WORKDIR/coverage.xml" .
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.job }}
          path: ./coverage*.xml

  skip:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        container:
          - ubuntu:questing
          - ubuntu:resolute
    container:
      image: ${{ matrix.container }}
    steps:
      - name: Sanitize container name (for artifact name)
        run: |
          container=$(echo "${{ matrix.container }}" | sed 's/:/-/')
          echo "JOB=${GITHUB_JOB}-${container}" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: >
          apt-get update
          && apt-get install --no-install-recommends --yes
          $checkout_deps $base_deps
      - uses: actions/checkout@v6
      - name: Run all tests (to check if they are skipped or succeed)
        run: >
          python3 -m pytest -v -ra --cov=$(pwd)
          --cov-report=xml --durations=0 -m "not requires_internet" tests/
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ env.JOB }}
          path: ./coverage.xml

  system:
    runs-on: ${{ matrix.architecture }}
    strategy:
      fail-fast: false
      matrix:
        container:
          - ubuntu:questing
          # resolute skipped due to https://launchpad.net/bugs/2147544
          # - ubuntu:resolute
        architecture:
          - ubuntu-26.04
          - ubuntu-26.04-arm
    container:
      image: ${{ matrix.container }}
    steps:
      - name: Sanitize container name (for artifact name)
        run: |
          container=$(echo "${{ matrix.container }}" | sed 's/:/-/')
          host="${{ matrix.architecture }}"
          echo "JOB=${GITHUB_JOB}-${container}-on-${host}" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: >
          apt-get update
          && apt-get install --no-install-recommends --yes
          $base_deps $common_deps $gtk_deps $kde_deps $system_deps
      - uses: actions/checkout@v6
      - name: Start D-Bus daemon
        run: mkdir -p /run/dbus && dbus-daemon --system --fork
      - name: Run system tests that do not require Internet access
        env:
          GDK_BACKEND: x11
        run: >
          xvfb-run python3 -m pytest -v -ra --cov=$(pwd)
          --cov-report=xml --durations=0
          -m "not requires_internet" tests/system/
      - name: Stop D-Bus daemon
        run: kill $(cat /run/dbus/pid)
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ env.JOB }}
          path: ./coverage.xml

  system-installed:
    runs-on: ubuntu-26.04
    strategy:
      fail-fast: false
    steps:
      - name: Remove system installed Apport
        run: >
          sudo apt-get remove --purge --yes
          apport python3-apport python3-problem-report
      - name: Install dependencies
        run: >
          sudo apt-get update
          && sudo apt-get install --no-install-recommends --yes
          $base_deps $build_deps $common_deps $gtk_deps $kde_deps $system_deps
      - uses: actions/checkout@v6
      - name: Install
        run: >
          sudo python3 -m coverage run
          ./setup.py install --install-layout=deb --prefix=/usr --root=/
          && sudo chown "$SUDO_UID:$SUDO_GID" .coverage
          && python3 -m coverage xml -o coverage-setup.xml
      - name: Cleanup /var/crash/
        run: sudo rm -f /var/crash/*.crash
      - name: Enable Apport
        run: sudo /usr/share/apport/apport --start
      - name: Run system tests that do not require Internet access
        env:
          GDK_BACKEND: x11
        run: >
          WORKDIR=$(mktemp -d -t apport.XXXXXXXXXX)
          && cp -r tests pyproject.toml "$WORKDIR"
          && cd "$WORKDIR"
          && sudo xvfb-run python3 -m pytest -v -ra --cov=$(pwd)
          --cov-report=xml --durations=0
          -m "not requires_internet" tests/system/
          && cd -
          && cp "$WORKDIR/coverage.xml" .
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.job }}
          path: ./coverage*.xml

  system-internet:
    runs-on: ${{ matrix.architecture }}
    strategy:
      fail-fast: false
      matrix:
        container:
          - ubuntu:questing
          - ubuntu:resolute
        architecture:
          - ubuntu-26.04
          - ubuntu-26.04-arm
    container:
      image: ${{ matrix.container }}
    steps:
      - name: Sanitize container name (for artifact name)
        run: |
          container=$(echo "${{ matrix.container }}" | sed 's/:/-/')
          host="${{ matrix.architecture }}"
          echo "JOB=${GITHUB_JOB}-${container}-on-${host}" >> "$GITHUB_ENV"
      - name: Enable 'deb-src' URIs in /etc/apt/sources.list
        run: >
          sed -i '/^#\sdeb-src /s/^#\s//' /etc/apt/sources.list
          && ! test -e /etc/apt/sources.list.d/ubuntu.sources
          || sed -i 's/^Types:.*/Types: deb deb-src/g'
          /etc/apt/sources.list.d/ubuntu.sources
      - name: Install dependencies
        run: >
          apt-get update
          && apt-get install --no-install-recommends --yes
          $base_deps $common_deps $system_internet_deps
      - uses: actions/checkout@v6
      - name: Run system tests that require Internet access
        run: >
          python3 -m pytest -v -ra --cov=$(pwd)
          --cov-report=xml --durations=0 -m "requires_internet" tests/system/
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ env.JOB }}
          path: ./coverage.xml

  system-internet-installed:
    runs-on: ubuntu-26.04
    strategy:
      fail-fast: false
    steps:
      - name: Remove system installed Apport
        run: >
          sudo apt-get remove --purge --yes
          apport python3-apport python3-problem-report
      - name: Enable 'deb-src' URIs in /etc/apt/sources.list.d/ubuntu.sources
        run: >
          sudo sed -i 's/^Types: deb$/Types: deb deb-src/'
          /etc/apt/sources.list.d/ubuntu.sources
      - name: Install dependencies
        run: >
          sudo apt-get update
          && sudo apt-get install --no-install-recommends --yes
          $base_deps $build_deps $common_deps $gtk_deps $system_internet_deps
      - uses: actions/checkout@v6
      - name: Install
        run: >
          sudo python3 -m coverage run
          ./setup.py install --install-layout=deb --prefix=/usr --root=/
          && sudo chown "$SUDO_UID:$SUDO_GID" .coverage
          && python3 -m coverage xml -o coverage-setup.xml
      - name: Cleanup /var/crash/
        run: sudo rm -f /var/crash/*.crash
      - name: Enable Apport
        run: sudo /usr/share/apport/apport --start
      - name: Run system tests that require Internet access
        env:
          GDK_BACKEND: x11
        run: >
          WORKDIR=$(mktemp -d -t apport.XXXXXXXXXX)
          && cp -r tests pyproject.toml "$WORKDIR"
          && cd "$WORKDIR"
          && sudo xvfb-run python3 -m pytest -v -ra --cov=$(pwd)
          --cov-report=xml --durations=0 -m "requires_internet" tests/system/
          && cd -
          && cp "$WORKDIR/coverage.xml" .
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.job }}
          path: ./coverage*.xml

  woke:
    name: woke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: woke
        uses: get-woke/woke-action@v0
        with:
          # Cause the check to fail on any broke rules
          fail-on-error: true

  upload-to-codecov:
    if: ${{ always() }}
    needs:
      - unit-and-integration
      - unit-and-integration-installed
      - skip
      - system
      - system-installed
      - system-internet
      - system-internet-installed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download artifacts
        uses: actions/download-artifact@v8
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
